<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>财务管理系统</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <rect width="48" height="48" rx="12" fill="#2563eb"/>
          <path d="M12 34V20l12-8 12 8v14H30V26h-4v8h-4v-8h-4v8H12z" fill="white"/>
        </svg>
      </div>
      <h1>财务管理系统</h1>
      <p class="login-subtitle">动画外包公司财务结算平台</p>
      <form id="loginForm">
        <div class="form-group">
          <label>用户名</label>
          <input type="text" id="username" placeholder="请输入用户名" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password" required>
        </div>
        <div id="loginError" class="error-msg" style="display:none"></div>
        <button type="submit" class="btn-primary btn-full" id="loginBtn">登录</button>
      </form>
    </div>
  </div>
  <script>
    if (localStorage.getItem('token')) window.location.href = '/dashboard.html';

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('loginError');
      btn.disabled = true;
      btn.textContent = '登录中...';
      err.style.display = 'none';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        localStorage.setItem('token', data.token);
        localStorage.setItem('username', data.username);
        localStorage.setItem('role', data.role);
        window.location.href = '/dashboard.html';
      } catch (error) {
        err.textContent = error.message;
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = '登录';
      }
    });
  </script>
</body>
</html>
